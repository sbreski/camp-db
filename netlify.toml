[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-src 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self'; script-src-elem 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; media-src 'self' blob: data:"

[[headers]]
  for = "/forms/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-src 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net 'sha256-EJRPkK8L1UeSIKl3i+gtA97jNpJktiwNl1nSh7Fgsrg=' 'sha256-RsmBSKrcIjeuxzhM7uAZm1juHtFfD1dqS/e6BENExKE=' 'sha256-IHpYTWK65NaMr2LoiGytqVD7cVn+LuwgqkuulXnDbLE=' 'sha256-l66iD82WNcKJ/dqpyW663YkYAv6sw20M1VMVvUxuU+c=' 'sha256-lOKfwcijIkaAiBqaPDpIfjKsxQToHuRWuYS/9k+PTEE='; script-src-elem 'self' https://cdn.jsdelivr.net 'sha256-EJRPkK8L1UeSIKl3i+gtA97jNpJktiwNl1nSh7Fgsrg=' 'sha256-RsmBSKrcIjeuxzhM7uAZm1juHtFfD1dqS/e6BENExKE=' 'sha256-IHpYTWK65NaMr2LoiGytqVD7cVn+LuwgqkuulXnDbLE=' 'sha256-l66iD82WNcKJ/dqpyW663YkYAv6sw20M1VMVvUxuU+c=' 'sha256-lOKfwcijIkaAiBqaPDpIfjKsxQToHuRWuYS/9k+PTEE='; script-src-attr 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; media-src 'self' blob: data:"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
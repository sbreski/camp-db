[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-src 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self'; script-src-elem 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; media-src 'self' blob: data:"

[[headers]]
  for = "/forms/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-src 'self'; frame-ancestors 'self'; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net 'sha256-XIbdgXWVBmh2Suj6G/Hc9u1sTAYc3+kmybtFri/joDI=' 'sha256-38keARbQIhuMKv89Wrvnszyc0oKHKBN2arK2W7gN1cM=' 'sha256-OtLtMHZ5/xkfM2bYlA2N+/UE4gUUQPoCfW8pYJZng6E=' 'sha256-ZeMhdvJaMdZmz/FfHrWrbFrJK/8XHiaZNa/2ne/V5z0=' 'sha256-kHpPgVk2nGSqQ72j/606+8zAWLzRuLGDWMzfuFMKMqQ='; script-src-elem 'self' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co; media-src 'self' blob: data:"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
name: Supabase Keepalive

on:
  schedule:
    # Daily at 09:15 UTC
    - cron: '15 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping keepalive endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "Missing GitHub secret KEEPALIVE_URL"
            exit 1
          fi

          max_attempts=4
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Pinging keepalive endpoint... attempt $attempt/$max_attempts"
            http_code=$(curl -sS --max-time 20 -o response.json -w "%{http_code}" "$KEEPALIVE_URL")

            echo "HTTP status: $http_code"
            cat response.json

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Keepalive ping succeeded"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Keepalive ping failed, retrying..."
            fi

            attempt=$((attempt + 1))
          done

          echo "Keepalive ping failed after $max_attempts attempts"
          exit 1
